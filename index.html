<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificador de Triângulo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 320px;
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    #resultado {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Verificador de Triângulo</h2>

    <input type="number" id="lado1" placeholder="Digite o lado 1">
    <input type="number" id="lado2" placeholder="Digite o lado 2">
    <input type="number" id="lado3" placeholder="Digite o lado 3">

    <button onclick="verificarTriangulo()">Verificar</button>

    <div id="resultado"></div>
  </div>

  <script>
    function verificarTriangulo() {
      let a = Number(document.getElementById("lado1").value);
      let b = Number(document.getElementById("lado2").value);
      let c = Number(document.getElementById("lado3").value);

      let resultado = document.getElementById("resultado");

      // Verifica se pode formar triângulo
      if (a < b + c && b < a + c && c < a + b) {

        // Verifica o tipo do triângulo
        if (a === b && b === c) {
          resultado.innerHTML = "Forma um Triângulo Equilátero";
        }
        else if (a === b || a === c || b === c) {
          resultado.innerHTML = "Forma um Triângulo Isósceles";
        }
        else {
          resultado.innerHTML = "Forma um Triângulo Escaleno";
        }

      } else {
        resultado.innerHTML = "Os valores não formam um triângulo";
      }
    }
  </script>

</body>
</html>
